name: Build Desktop Application

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux Targets (Debian & AppImage)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install Node.js Dependencies
        run: npm install

      - name: Compile React Frontend Assets
        run: npm run build

      - name: Compile and Bundle Tauri Application
        run: npm run tauri build -- --target x86_64-unknown-linux-gnu

      - name: Archive Linux Package Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agneax-store-linux
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

  build-windows:
    name: Build Windows Targets (MSI & EXE)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Node.js Dependencies
        run: npm install

      - name: Compile React Frontend Assets
        run: npm run build

      - name: Compile and Bundle Tauri Application
        run: npm run tauri build

      - name: Archive Windows Package Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agneax-store-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
